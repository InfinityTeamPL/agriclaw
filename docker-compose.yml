services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: agriclaw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agriclaw
      POSTGRES_PASSWORD: agriclaw
      POSTGRES_DB: agriclaw
    ports:
      - "5432:5432"
    volumes:
      - agriclaw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriclaw -d agriclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agriclaw-pgdata:
